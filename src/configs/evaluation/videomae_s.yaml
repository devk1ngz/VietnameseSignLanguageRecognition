data:
  dataset: visl_400
  modality: rgb
  subset: cam_1_2_3
  data_dir: ../data/processed/vsl_400
  transform:
    horizontal_flip_prob: 0.5
    aug_type: augmix
    aug_paras:
      magnitude: 3
      alpha: 1.0
      width: 5
      depth: -1
    sample_rate: 4
  fps: 30
  debug: False
evaluation:
  arch: videomae
  # Update to the best checkpoint after training (experiments/videomae_s_multicam/checkpoint-<best>)
  pretrained: experiments/videomae_s_multicam
  eval_set: test
  batch_size: 8
