data:
  dataset: visl_400
  modality: pose
  subset: cam_1
  data_dir: ../data/processed/vsl_400
  transform:
    augmentation: True
    aug_prob: 0.5
    normalization: True
  fps: 30
  debug: False
model:
  arch: spoter
  num_frozen_layers: 0
  num_frames: 70
  hidden_dim: 108
training:
  run_name: spoter_v2.0
  learning_rate: 0.001
  weight_decay: 0.01
  num_train_epochs: 350
  per_device_train_batch_size: 256
  per_device_eval_batch_size: 256
  dataloader_num_workers: 16
  eval_strategy: steps
  eval_steps: 375          # 19051/256 ≈ 75 steps/epoch → eval mỗi 5 epochs
  save_strategy: steps
  save_steps: 375          # phải khớp eval_steps vì load_best_model_at_end=True
  logging_steps: 75        # log mỗi epoch
  metric_for_best_model: accuracy
  # report_to: wandb
  push_to_hub: False
  # hub_model_id: vsltranslation    # Only enter organization/account name