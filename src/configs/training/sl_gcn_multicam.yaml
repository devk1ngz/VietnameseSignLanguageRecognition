data:
  dataset: visl_400
  modality: pose
  subset: cam_1_2_3
  data_dir: ../data/processed/vsl_400
  transform:
    augmentation: True
    aug_prob: 0.7
    normalization: True
    # SL-GCN specific geometric augmentation (applied together)
    rotation_std: 0.2
    shear_std: 0.2
    scale_std: 0.2
    # Coordinate-space regularisation (train only)
    joint_mask_prob: 0.1
    frame_mask_prob: 0.1
  fps: 30
  debug: False
model:
  arch: sl_gcn
  num_frozen_layers: 0
  num_frames: 150
  num_points: 27
  groups: 8
  block_size: 41
  in_channels: 3
  labeling_mode: spatial
  dropout: 0.15
  is_vector: False
  bone_stream: False
  motion_stream: False
training:
  run_name: sl_gcn_v2.0_multicam
  learning_rate: 0.001
  weight_decay: 0.05
  lr_scheduler_type: cosine
  label_smoothing_factor: 0.1
  num_train_epochs: 350
  early_stopping_patience: 30
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 64
  dataloader_num_workers: 16
  save_total_limit: 5
  eval_strategy: epoch
  save_strategy: epoch
  logging_strategy: epoch
  metric_for_best_model: accuracy
  # report_to: wandb
  push_to_hub: False
  # hub_model_id: vsltranslation    # Only enter organization/account name
